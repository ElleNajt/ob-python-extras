name: Emacs org babel tests

on:
  push:
    branches: [ "master", "Development" ]
  pull_request:
    branches: [ "master", "Development" ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      
    - name: Set up Python and dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y imagemagick
        uv sync
        
    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@main
    
    - name: Setup Nix Cache
      uses: DeterminateSystems/magic-nix-cache-action@main
      
    - name: Install Emacs
      uses: purcell/setup-emacs@master
      with:
        version: 29.4

    # - name: Setup tmate session
    #   uses: mxschmitt/action-tmate@v3
    #   timeout-minutes: 15

    - name: Test nix shells
      shell: bash
      timeout-minutes: 10
      working-directory: tests
      env:
        NO_SANDBOX: "True"
      run: ./test_nix_shells.sh

    - name: Run Tests
      shell: bash
      timeout-minutes: 10
      env:
        NO_SANDBOX: "True"
      working-directory: tests
      run: |
        set -x
        echo "=== Python version ==="
        ../.venv/bin/python3 --version
        echo "=== Venv location ==="
        ls -la ../.venv/bin/ | head -5
        echo "=== Running tests ==="
        ./run_expect_tests.sh || {
          echo "=== Test failed, showing diffs ==="
          for f in golden/*.json; do
            name=$(basename "$f" .json)
            if [ -f "staging/babel-formatting.org" ]; then
              echo "=== $name ===" 
              cat "$f" | head -20
              echo "---"
            fi
          done
          cat test-results.xml
          exit 1
        }

    - name: Publish Test Results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always()
      with:
        files: tests/test-results.xml
        report_individual_runs: true
